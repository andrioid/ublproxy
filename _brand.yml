meta:
  name:
    full: ublproxy
    short: ublproxy
  link:
    home: https://andrioid.github.io/ublproxy/
    github: https://github.com/andrioid/ublproxy

logo:
  small:
    light: web/favicon.svg
    dark: web/favicon.svg
  medium:
    light: web/og-image.png
    dark: web/og-image.png

color:
  palette:
    black: "#08080c"
    black-elevated: "#0e0e14"
    black-card: "#12121a"
    border: "#1e1e2a"
    border-light: "#181822"
    gray: "#c8c8d0"
    gray-muted: "#707080"
    gray-faint: "#3a3a4a"
    green: "#00ff41"
    green-hover: "#00cc33"
    cyan: "#00e5ff"
    magenta: "#ff2d7b"
    yellow: "#ffe600"
  foreground: gray
  background: black
  primary: green
  secondary: cyan
  tertiary: magenta
  success: green
  info: cyan
  warning: yellow
  danger: magenta
  light: gray
  dark: black
  link: green

typography:
  fonts:
    - family: JetBrains Mono
      source: google
      weight: [400, 500, 600, 700]
      style: normal
      display: swap
  base:
    family: JetBrains Mono
    size: 1rem
    weight: 400
    line-height: 1.6
  headings:
    family: JetBrains Mono
    weight: 700
    style: normal
    color: foreground
    line-height: 1.15
  monospace:
    family: JetBrains Mono
    size: 0.85rem
    weight: 400
    color: foreground
    background-color: black-elevated
  monospace-inline:
    family: JetBrains Mono
    size: 0.82em
    color: yellow
    background-color: black-elevated
  monospace-block:
    family: JetBrains Mono
    size: 0.78rem
    color: foreground
    background-color: black-elevated
    line-height: 1.6
  link:
    color: green
    decoration: none
